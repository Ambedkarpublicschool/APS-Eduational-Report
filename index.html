<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Educational Monitoring System</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Loader -->
    <div id="loader" class="loader" style="display:none;">
        Loading...
    </div>

    <!-- Header -->
    <header class="header">

        <div class="logo">

            <img src="assets/logo.png" alt="Logo">

        </div>

        <div class="school-details">

            <h1 id="schoolName">Aryavart Public School</h1>

            <p>Educational Monitoring System</p>

        </div>

    </header>

    <!-- Navigation -->

    <nav class="tabs">

        <button id="attendanceTab">

            Attendance

        </button>

        <button id="reportTab">

            Educational Report

        </button>

    </nav>

    <!-- Filters -->

    <section class="filters">

        <select id="session">

        </select>

        <select id="class">

        </select>

        <select id="section">

        </select>

        <input

            type="text"

            id="search"

            placeholder="Search Student">

    </section>

    <!-- Content -->

    <main id="content">

    </main>

    <!-- Report Modal -->

    <div id="reportModal" class="modal">

        <div class="modal-content">

            <span id="closeModal">

                ×

            </span>

            <div id="modalBody">

            </div>

        </div>

    </div>

    <!-- Toast -->

    <div id="toast">

    </div>

    <script src="config.js"></script>

    <script src="api.js"></script>

    <script src="attendance.js"></script>

    <script src="report.js"></script>

</body>

</html>
